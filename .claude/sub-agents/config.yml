        delegate_to: web-cleanup-specialist
        confidence: medium
      - trigger: "state OR zustand OR jotai OR react query OR tanstack OR global state"
        delegate_to: web-state-specialist
        confidence: high

  backend-expert:
    rules:
      - trigger: "api OR endpoint OR route OR controller OR middleware OR rest OR graphql"
        delegate_to: api-implementation-specialist
        confidence: high
      - trigger: "database OR db OR migration OR schema OR query OR orm OR prisma OR sqlite"
        delegate_to: database-integration-specialist
        confidence: high
      - trigger: "auth OR security OR jwt OR owasp OR validation OR sanitize OR password"
        delegate_to: backend-security-specialist
        confidence: high
      - trigger: "deploy OR pm2 OR docker OR health check OR production OR staging"
        delegate_to: backend-deployment-specialist
        confidence: high
      - trigger: "test OR jest OR vitest OR supertest OR coverage OR mock"
        delegate_to: backend-testing-specialist
        confidence: high

  mobile-expert:
    rules:
      - trigger: "capacitor OR android OR ios OR apk OR native build OR gradle"
        delegate_to: capacitor-build-specialist
        confidence: high
      - trigger: "pwa OR service worker OR offline OR manifest OR workbox"
        delegate_to: pwa-specialist
        confidence: high
      - trigger: "touch OR gesture OR swipe OR mobile ui OR responsive OR safe area"
        delegate_to: mobile-ui-specialist
        confidence: high
      - trigger: "mobile test OR device test OR emulator OR adb OR appium"
        delegate_to: mobile-testing-specialist
        confidence: high
      - trigger: "mobile performance OR lighthouse OR bundle size OR lazy load OR fps OR TTI"
        delegate_to: mobile-performance-specialist
        confidence: high

  rag-expert:
    rules:
      - trigger: "rag OR retrieval OR embeddings OR vector OR chunking OR llamaindex OR langchain"
        delegate_to: rag-pipeline-specialist
        confidence: high

  mcp-expert:
    rules:
      - trigger: "mcp server OR model context protocol OR tool definition OR mcp resource OR mcp builder"
        delegate_to: mcp-server-specialist
        confidence: high

  monorepo-expert:
    rules:
      - trigger: "nx affected OR project graph OR workspace health OR nx cache OR run-many OR nx reset OR dependency graph OR circular dependencies"
        delegate_to: nx-workspace-specialist
        confidence: high

  crypto-expert:
    rules:
      - trigger: "strategy OR algorithm OR backtest OR rsi OR macd OR position sizing OR risk management OR stop loss"
        delegate_to: trading-strategy-specialist
        confidence: high
      - trigger: "kraken OR websocket OR order OR nonce OR circuit breaker OR exchange OR rate limit"
        delegate_to: exchange-integration-specialist
        confidence: high
      - trigger: "paper trading OR simulation OR crypto test OR mock orders OR safety test OR dry run"
        delegate_to: crypto-testing-specialist
        confidence: high

  escalation:
    - condition: "complex refactoring (>5 files)"
      return_to: parent_agent
      reason: "architectural_decision"
    - condition: "security vulnerability detected"
      return_to: parent_agent
      reason: "security_review"
    - condition: "sub-agent timeout or repeated failures"
      return_to: parent_agent
      reason: "execution_failure"
    - condition: "user confirmation needed"
      return_to: parent_agent
      reason: "user_confirmation"
    - condition: "database migration with data loss risk"
      return_to: parent_agent
      reason: "destructive_operation"
    - condition: "native plugin requires security review"
      return_to: parent_agent
      reason: "native_security"

# =============================================================================
# PARALLEL EXECUTION
# =============================================================================
parallel_execution:
  enabled: true
  max_concurrent: 3

  parallel_safe:
    # Desktop
    - [desktop-quality-checker, desktop-cleanup-specialist]
    - [desktop-test-coordinator, desktop-cleanup-specialist]
    - [desktop-mcp-specialist, desktop-rag-specialist]
    # Web
    - [vite-build-specialist, web-cleanup-specialist]
    - [react-component-specialist, ui-integration-specialist]
    - [react-component-specialist, web-state-specialist]
    - [web-testing-specialist, web-cleanup-specialist]
    - [web-state-specialist, ui-integration-specialist]
    # Backend
    - [api-implementation-specialist, backend-deployment-specialist]
    - [database-integration-specialist, backend-security-specialist]
    # Mobile
    - [pwa-specialist, mobile-ui-specialist]
    - [capacitor-build-specialist, mobile-testing-specialist]
    - [mobile-performance-specialist, mobile-ui-specialist]
    # RAG / MCP
    - [rag-pipeline-specialist, mcp-server-specialist]
    # Monorepo - nx-workspace safe alongside read-only agents
    - [nx-workspace-specialist, desktop-quality-checker]
    - [nx-workspace-specialist, web-testing-specialist]
    # Crypto - strategy and testing can run in parallel
    - [trading-strategy-specialist, crypto-testing-specialist]

  sequential_required:
    # Desktop - fix before test
    - [desktop-quality-checker, desktop-test-coordinator]
    # CRITICAL: MCP must be validated before IPC bridge setup
    - [desktop-mcp-specialist, desktop-integration-specialist]
    - [mcp-server-specialist, desktop-integration-specialist]
    # Web - build before test
    - [vite-build-specialist, web-testing-specialist]
    - [react-component-specialist, web-testing-specialist]
    - [web-state-specialist, web-testing-specialist]
    # Backend - implement before security audit
    - [api-implementation-specialist, backend-security-specialist]
    - [database-integration-specialist, backend-testing-specialist]
    # Backend - always security check before deploy
    - [backend-security-specialist, backend-deployment-specialist]
    # Mobile - build before test, performance after build
    - [capacitor-build-specialist, mobile-testing-specialist]
    - [pwa-specialist, mobile-testing-specialist]
    - [capacitor-build-specialist, mobile-performance-specialist]
    # RAG - pipeline before desktop RAG integration
    - [rag-pipeline-specialist, desktop-rag-specialist]
    # Monorepo - cache must be cleared before running affected
    - [nx-workspace-specialist, desktop-build-specialist]  # nx reset before rebuild
    # Crypto - exchange integration before testing, strategy before testing
    - [exchange-integration-specialist, crypto-testing-specialist]
    - [trading-strategy-specialist, crypto-testing-specialist]
    # Crypto - NEVER deploy exchange changes without safety tests
    - [crypto-testing-specialist, exchange-integration-specialist]

# =============================================================================
# CACHING
# =============================================================================
caching:
  enabled: true
  storage: .nx/cache/sub-agents
  ttl: 300

  cache_keys:
    # Desktop
    desktop-quality-checker: "quality:${project}:${files_hash}:${config_hash}"
    desktop-test-coordinator: "test:${project}:${files_hash}:${test_config_hash}"
    desktop-cleanup-specialist: null
    desktop-build-specialist: "build:${project}:${files_hash}:${config_hash}"
    desktop-integration-specialist: "ipc:${project}:${files_hash}"
    # Web
    vite-build-specialist: "vite:${project}:${files_hash}:${config_hash}"
    react-component-specialist: "react:${project}:${component_hash}"
    ui-integration-specialist: "ui:${project}:${styles_hash}"
    web-testing-specialist: "webtest:${project}:${files_hash}:${test_config_hash}"
    web-cleanup-specialist: null
    # Backend
    api-implementation-specialist: "api:${project}:${routes_hash}:${config_hash}"
    database-integration-specialist: "db:${project}:${schema_hash}:${migrations_hash}"
    backend-security-specialist: "security:${project}:${files_hash}"
    backend-deployment-specialist: "deploy:${project}:${config_hash}"
    backend-testing-specialist: "backtest:${project}:${files_hash}:${test_config_hash}"
    # Mobile
    capacitor-build-specialist: "cap:${project}:${files_hash}:${config_hash}"
    pwa-specialist: "pwa:${project}:${manifest_hash}:${sw_hash}"
    mobile-ui-specialist: "mobui:${project}:${component_hash}"
    mobile-testing-specialist: "mobtest:${project}:${files_hash}:${test_config_hash}"
    mobile-performance-specialist: "mobperf:${project}:${files_hash}:${build_hash}"
    # Phase 5 new agents
    desktop-mcp-specialist: "deskmcp:${project}:${mcp_config_hash}"
    desktop-rag-specialist: "deskrag:${project}:${rag_config_hash}:${files_hash}"
    web-state-specialist: "webstate:${project}:${stores_hash}"
    rag-pipeline-specialist: "ragpipe:${pipeline_config_hash}:${documents_hash}"
    mcp-server-specialist: "mcpsvr:${project}:${tools_hash}:${config_hash}"
    nx-workspace-specialist: "nxws:${workspace_hash}:${project_graph_hash}"
    # Phase 6 Crypto
    trading-strategy-specialist: "strategy:${strategy_hash}:${config_hash}"
    exchange-integration-specialist: "exchange:${project}:${api_config_hash}"
    crypto-testing-specialist: "cryptest:${test_hash}:${strategy_hash}"

  invalidation:
    on_file_change: true
    on_config_change: true
    on_dependency_change: true
    on_schema_change: true
    on_manifest_change: true
    # CRITICAL: Redis cache invalidation rule
    # When Redis is used for caching in any specialist, invalidation MUST follow this pattern:
    # 1. Delete by key pattern (not flush all) to avoid cache stampede
    # 2. Use SCAN + DEL, never KEYS + DEL in production
    # 3. Set new cache entry BEFORE deleting old (swap pattern for zero-downtime)
    # 4. rag-pipeline-specialist: always invalidate on document_hash change
    # 5. mcp-server-specialist: invalidate tool cache when MCP server restarts
    on_redis_key_pattern_change: true
    redis_invalidation_strategy: "scan_and_del"
    redis_swap_pattern: true

# =============================================================================
# METRICS & REPORTING
# =============================================================================
metrics:
  enabled: true
  collection_interval: daily
  report_format: json
  report_path: D:\learning-system\sub-agents\metrics

  track:
    - execution_time
    - success_rate
    - cache_hit_rate
    - disk_space_recovered
    - tests_run
    - auto_fixes_applied
    - errors_found
    - errors_fixed
    - builds_completed
    - components_analyzed
    - security_issues_found
    - migrations_applied
    - api_endpoints_created
    - pwa_score
    - mobile_builds_completed

  thresholds:
    # Desktop
    desktop_quality_pass_time: 180000
    desktop_test_pass_time: 300000
    desktop_cleanup_pass_time: 120000
    desktop_build_pass_time: 300000
    # Web
    web_build_pass_time: 300000
    web_test_pass_time: 600000
    web_component_pass_time: 180000
    # Backend
    backend_api_pass_time: 300000
    backend_db_pass_time: 300000
    backend_security_pass_time: 240000
    backend_deploy_pass_time: 300000
    backend_test_pass_time: 600000
    # Mobile
    mobile_capacitor_pass_time: 300000
    mobile_pwa_pass_time: 240000
    mobile_ui_pass_time: 180000
    mobile_test_pass_time: 600000
    mobile_performance_pass_time: 240000
    # Phase 5 new agents
    desktop_mcp_pass_time: 240000
    desktop_rag_pass_time: 300000
    web_state_pass_time: 180000
    rag_pipeline_pass_time: 300000
    mcp_server_pass_time: 240000
    nx_workspace_pass_time: 300000
    # Phase 6 Crypto
    crypto_strategy_pass_time: 300000
    crypto_exchange_pass_time: 300000
    crypto_testing_pass_time: 600000

# =============================================================================
# COST OPTIMIZATION
# =============================================================================
cost_optimization:
  prefer_haiku: true
  prefer_cache: true
  parallel_execution: true
  context_minimization: true

  model_assignment:
    haiku_tasks:
      - quality_checks
      - builds
      - cleanups
      - component_patterns
      - ui_integration
      - api_implementation
      - deployment_tasks
      - testing_execution
      - pwa_configuration
      - mobile_ui
      - mobile_testing
      - mobile_performance
      - desktop_mcp_validation
      - web_state_analysis
      - mcp_server_building
      - nx_workspace_health
      - crypto_testing
    sonnet_tasks:
      - test_strategy
      - ipc_security
      - database_integration
      - security_review
      - schema_design
      - native_integration
      - capacitor_builds
      - desktop_rag_integration
      - rag_pipeline_design
      - trading_strategy_design  # financial logic - reasoning required
      - exchange_integration     # security-sensitive - reasoning required

  targets:
    api_cost_reduction: 20
    execution_time_reduction: 40

# =============================================================================
# INTEGRATION
# =============================================================================
integration:
  parent_agents:
    - desktop-expert
    - webapp-expert
    - backend-expert
    - mobile-expert
    - crypto-expert
    - rag-expert
    - mcp-expert
    - monorepo-expert

  delegation_mode: automatic
  response_format: json
  error_handling: return_to_parent

  sub_agent_outputs:
    # Desktop
    desktop-quality-checker:
      success: "Quality checks passed - ${auto_fixes_applied} fixes applied"
      failure: "Quality checks failed - ${errors_count} errors remaining"
    desktop-test-coordinator:
