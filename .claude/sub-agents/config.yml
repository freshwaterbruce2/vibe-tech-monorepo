      - src/controllers/**/*.ts
      - src/middleware/**/*.ts
      - src/api/**/*.ts
      - openapi.yaml
      - swagger.json
      - package.json (scripts, dependencies)
      - tsconfig.json

    context_excludes:
      - node_modules
      - dist
      - .nx
      - coverage

    api_patterns:
      rest:
        - resource_based_urls
        - proper_http_methods
        - consistent_response_format
        - pagination_support
        - rate_limiting
      graphql:
        - schema_first_design
        - resolver_organization
        - dataloader_for_n_plus_one
        - error_handling
      validation:
        - zod_schemas
        - input_sanitization
        - type_coercion
      error_handling:
        - centralized_error_handler
        - proper_status_codes
        - structured_error_responses

    best_practices:
      - use_async_await
      - validate_all_inputs
      - handle_errors_gracefully
      - log_appropriately
      - document_endpoints

  database-integration-specialist:
    enabled: true
    priority: high
    parent_agent: backend-expert
    model: claude-sonnet-4-6
    context_limit: 4500
    timeout: 300000
    cache_enabled: true
    cache_ttl: 600

    delegation_triggers:
      keywords:
        - database
        - db
        - sqlite
        - postgres
        - mysql
        - migration
        - schema
        - query
        - orm
        - prisma
        - drizzle
        - knex
        - sequelize
        - typeorm
        - index
        - foreign key
        - transaction
      commands:
        - /backend:db
        - /backend:migration
        - /backend:schema
        - /backend:query
      nx_targets:
        - db:migrate
        - db:seed
        - db:reset

    context_includes:
      - prisma/schema.prisma
      - drizzle.config.ts
      - src/db/**/*.ts
      - src/models/**/*.ts
      - migrations/**/*.ts
      - knexfile.ts
      - package.json (database deps)

    storage_policy:
      database_location: "D:\\databases"
      sqlite_path_pattern: "D:\\databases\\{app_name}\\{db_name}.db"
      backup_location: "D:\\databases\\_backups"
      never_store_in: "C:\\dev"

    database_patterns:
      sqlite:
        - wal_mode_enabled
        - connection_pooling
        - proper_indexing
        - foreign_keys_enabled
        - busy_timeout_configured
      migrations:
        - atomic_transactions
        - up_and_down_methods
        - timestamp_prefixes
        - descriptive_names
        - data_integrity_checks
      queries:
        - parameterized_queries
        - avoid_n_plus_one
        - use_transactions
        - proper_error_handling

    optimization:
      analyze_query_plans: true
      suggest_indexes: true
      detect_n_plus_one: true
      recommend_caching: true

  backend-security-specialist:
    enabled: true
    priority: high
    parent_agent: backend-expert
    model: claude-sonnet-4-6
    context_limit: 4500
    timeout: 240000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
      keywords:
        - auth
        - authentication
        - authorization
        - jwt
        - oauth
        - session
        - password
        - bcrypt
        - argon2
        - security
        - owasp
        - xss
        - csrf
        - injection
        - validation
        - sanitize
        - rate limit
        - cors
        - helmet
      commands:
        - /backend:security
        - /backend:auth
        - /backend:audit
      nx_targets: []

    context_includes:
      - src/auth/**/*.ts
      - src/middleware/auth*.ts
      - src/middleware/security*.ts
      - src/utils/crypto*.ts
      - src/validators/**/*.ts
      - .env.example (patterns only, never real secrets)

    security_checklist:
      owasp_top_10:
        - A01_broken_access_control
        - A02_cryptographic_failures
        - A03_injection
        - A04_insecure_design
        - A05_security_misconfiguration
        - A06_vulnerable_components
        - A07_auth_failures
        - A08_integrity_failures
        - A09_logging_failures
        - A10_ssrf

      authentication:
        - password_hashing: "bcrypt or argon2id"
        - jwt_secret_rotation: required
        - session_management: "secure httpOnly cookies"
        - mfa_support: recommended
        - brute_force_protection: "rate limiting + lockout"

      authorization:
        - rbac_implementation: required
        - permission_checks: "on every protected route"
        - resource_ownership: "verify user owns resource"

      input_validation:
        - sanitize_all_inputs: required
        - parameterized_queries: required
        - content_type_validation: required
        - file_upload_validation: required

      headers:
        - helmet_enabled: required
        - cors_configured: required
        - csp_enabled: recommended
        - hsts_enabled: recommended

    audit_output:
      severity_levels:
        - critical
        - high
        - medium
        - low
        - info
      format: structured_json
      include_remediation: true
      reference_standards: true

  backend-deployment-specialist:
    enabled: true
    priority: medium
    parent_agent: backend-expert
    model: claude-haiku-4-5
    context_limit: 3500
    timeout: 300000
    cache_enabled: true
    cache_ttl: 600

    delegation_triggers:
      keywords:
        - deploy
        - deployment
        - pm2
        - docker
        - container
        - ci
        - cd
        - pipeline
        - health check
        - monitoring
        - logging
        - environment
        - env
        - config
        - production
        - staging
      commands:
        - /backend:deploy
        - /backend:pm2
        - /backend:docker
        - /backend:health
      nx_targets:
        - deploy
        - build:prod

    context_includes:
      - ecosystem.config.js
      - pm2.config.js
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - .env.example
      - src/health/**/*.ts
      - package.json (scripts)

    deployment_patterns:
      pm2:
        - cluster_mode: "for multi-core"
        - graceful_shutdown: required
        - log_rotation: required
        - memory_limit: "per app setting"
        - restart_policy: "on crash with backoff"
        - watch_disabled_prod: required

      docker:
        - multi_stage_builds: required
        - non_root_user: required
        - healthcheck: required
        - minimal_base_image: "node:20-alpine"
        - security_scanning: recommended

      health_checks:
        - liveness_probe: "/health/live"
        - readiness_probe: "/health/ready"
        - database_connectivity: required
        - external_deps_check: recommended

      logging:
        - structured_json: required
        - correlation_ids: required
        - log_levels: "configurable per env"
        - pii_redaction: required

      zero_downtime:
        - rolling_updates: required
        - connection_draining: required
        - graceful_shutdown_timeout: "30s"

    windows_specific:
      pm2_service: "pm2-installer for Windows Service"
      iis_integration: optional
      event_log: optional

  backend-testing-specialist:
    enabled: true
    priority: high
    parent_agent: backend-expert
    model: claude-haiku-4-5
    context_limit: 3500
    timeout: 600000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
      keywords:
        - test
        - jest
        - vitest
        - supertest
        - mock
        - stub
        - fixture
        - coverage
        - unit test
        - integration test
        - api test
      commands:
        - /backend:test
        - /backend:coverage
        - /backend:test-api
      nx_targets:
        - test
        - test:coverage
        - test:integration

    context_includes:
      - jest.config.js
      - vitest.config.ts
      - src/**/*.test.ts
      - src/**/*.spec.ts
      - tests/**/*.ts
      - package.json (test scripts)

    test_patterns:
      unit_tests:
        - isolate_dependencies
        - mock_external_services
        - test_edge_cases
        - arrange_act_assert
      integration_tests:
        - test_real_database
        - use_test_containers
        - setup_teardown_fixtures
        - test_api_contracts
      api_tests:
        - supertest_for_http
        - test_all_status_codes
        - validate_response_schemas
        - test_auth_flows

    coverage_threshold:
      statements: 80
      branches: 75
      functions: 80
      lines: 80

