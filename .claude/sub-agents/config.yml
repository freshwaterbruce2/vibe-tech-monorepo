    database-integration-specialist:
      success: "Database ready - ${migrations_applied} migrations, schema validated"
      failure: "Database issues - ${schema_errors} errors, check D:\\ storage policy"
    backend-security-specialist:
      success: "Security audit passed - ${checks_passed}/${total_checks} OWASP checks"
      failure: "Security issues - ${critical_count} critical, ${high_count} high severity"
    backend-deployment-specialist:
      success: "Deployment ready - health checks passing, PM2 configured"
