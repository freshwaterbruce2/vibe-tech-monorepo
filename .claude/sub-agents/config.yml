# Sub-Agent Configuration
# Created: 2026-01-15
# Updated: 2026-02-18 - v1: 6 new specialists, 3 new parent experts, model strings fixed, Redis+MCP rules
# Purpose: Context limits, model selection, and delegation rules for all category sub-agents
# Reference: VoltAgent/awesome-claude-code-subagents patterns

version: 5.0
phase: 5  # Phase 5: RAG/MCP/Monorepo specialists (Desktop, Web, Backend, Mobile complete)

# Global Settings
defaults:
  context_budget:
    main_agent: 100000      # Parent experts (full system context)
    specialist_agent: 20000  # Project-specific agents
    sub_agent: 5000         # Task-specific sub-agents (default)

  model_selection:
    orchestrator: claude-opus-4-6       # Strategic decisions
    specialist: claude-sonnet-4-6       # Balanced reasoning
    sub_agent_fast: claude-haiku-4-5    # Fast, cheap, deterministic
    sub_agent_balanced: claude-sonnet-4-6  # Requires reasoning

  execution:
    parallel_limit: 3       # Max sub-agents running in parallel
    timeout: 300000         # 5 minutes per sub-agent
    cache_ttl: 300          # 5-minute cache for results
    retry_limit: 2          # Retry failed sub-agents twice

# =============================================================================
# PHASE 1: DESKTOP APPS (COMPLETE)
# =============================================================================
sub_agents:
  desktop-quality-checker:
    enabled: true
    priority: high
    parent_agent: desktop-expert
    model: claude-haiku-4-5
    context_limit: 3000
    timeout: 180000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
      keywords:
        - lint
        - typecheck
        - format
        - quality
        - eslint
        - prettier
        - typescript
      commands:
        - /desktop:quality-check
        - /desktop:lint
        - /desktop:format
      nx_targets:
        - lint
        - typecheck
        - format

    context_includes:
      - eslint.config.mjs
      - eslint.config.js
      - .eslintrc.cjs
      - tsconfig.json
      - tsconfig.*.json
      - prettier.config.js
      - .prettierrc
      - package.json (scripts only)

    context_excludes:
      - node_modules
      - dist
      - .nx
      - src (full source - only modified files)

    auto_fix:
      enabled: true
      patterns:
        - unused_react_import
        - unused_variables
        - import_order
        - prettier_format

    performance:
      parallel_checks: true
      node_options:
        vibe-code-studio: --max-old-space-size=4096
        default: --max-old-space-size=2048

  desktop-test-coordinator:
    enabled: true
    priority: high
    parent_agent: desktop-expert
    model: claude-sonnet-4-6
    context_limit: 5000
    timeout: 600000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
      keywords:
        - test
        - coverage
        - e2e
        - playwright
        - vitest
        - jest
        - unit test
        - integration test
      commands:
        - /desktop:test-smart
        - /desktop:test
        - /desktop:coverage
      nx_targets:
        - test
        - test:coverage
        - test:e2e
        - test:watch

    context_includes:
      - vitest.config.ts
      - playwright.config.ts
      - jest.config.js
      - package.json (test scripts)
      - "**/*.test.ts (file paths only)"
      - "**/*.spec.ts (file paths only)"

    test_selection:
      strategy: affected
      fallback: targeted
      coverage_threshold:
        statements: 80
        branches: 75
        functions: 80
        lines: 80

    flaky_test_handling:
      enabled: true
      retry_count: 3
      detection_threshold: 0.5
      quarantine_threshold: 0.2

    playwright:
      auto_install: true
      browser_cache_limit: 2
      browsers:
        - chromium

  desktop-cleanup-specialist:
    enabled: true
    priority: medium
    parent_agent: desktop-expert
    model: claude-haiku-4-5
    context_limit: 2000
    timeout: 120000
    cache_enabled: false

    delegation_triggers:
      keywords:
        - clean
        - cleanup
        - remove
        - archive
        - disk space
        - delete
        - free up
      commands:
        - /desktop:cleanup
        - /desktop:clean
        - /desktop:archive-logs
      nx_targets:
        - clean
        - clean:all

    context_includes:
      - directory structure (paths only)
      - .gitignore
      - package.json (build paths)

    cleanup_targets:
      build_artifacts:
        - dist-electron-*
        - target/debug
        - target/release (keep last 3)
        - .tsbuildinfo
        - .nx/cache
      logs:
        patterns:
          - "*.log"
          - "*_error.txt"
          - "build_*.txt"
          - "test_*.txt"
        max_age_days: 7
        archive_to: D:\logs\archive
        compress: true
      test_artifacts:
        - .nyc_output
        - test-results
        - playwright-report
        - coverage (keep latest)
      cache:
        - node_modules/.cache
        - .cache
        - .electron-gyp

    safety:
      dry_run_first: true
      confirmation_threshold: 1000000000
      backup_before_delete: false
      preserve_patterns:
        - dist-electron
        - dist
        - node_modules

    performance:
      parallel_deletion: true
      incremental: true

  desktop-build-specialist:
    enabled: true
    priority: high
    parent_agent: desktop-expert
    model: claude-haiku-4-5
    context_limit: 3500
    timeout: 300000
    cache_enabled: true
    cache_ttl: 600

    delegation_triggers:
      keywords:
        - build
        - compile
        - package
        - bundle
        - electron-builder
        - tauri build
        - nsis
        - installer
        - exe
        - msi
      commands:
        - /desktop:build
        - /desktop:package
        - /desktop:dist
      nx_targets:
        - build
        - build:prod
        - package
        - make

    context_includes:
      - electron-builder.json
      - electron-builder.yml
      - tauri.conf.json
      - vite.config.ts
      - vite.main.config.ts
      - vite.preload.config.ts
      - package.json (build scripts)

    build_targets:
      electron:
        - win-unpacked
        - nsis
        - portable
      tauri:
        - windows-msvc

    optimization:
      parallel_builds: false
      incremental: true
      source_maps: false

  desktop-integration-specialist:
    enabled: true
    priority: high
    parent_agent: desktop-expert
    model: claude-sonnet-4-6
    context_limit: 4500
    timeout: 240000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
      keywords:
        - ipc
        - preload
        - contextBridge
        - native
        - main process
        - renderer
        - electron api
        - tauri command
        - invoke
      commands:
        - /desktop:ipc
        - /desktop:native
        - /desktop:bridge
      nx_targets: []

    context_includes:
      - electron/preload.ts
      - electron/main.ts
      - src-tauri/src/*.rs
      - ipc-security.ts
      - shared-database.ts

    security_rules:
      - validate_all_ipc_channels
      - no_node_integration
      - context_isolation_required
      - whitelist_only_channels

