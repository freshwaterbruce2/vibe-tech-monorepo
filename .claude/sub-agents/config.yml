        - endpoint
        - route
        - controller
        - middleware
        - rest
        - graphql
        - express
        - fastify
        - hono
        - request
        - response
        - http
      commands:
        - /backend:api
        - /backend:endpoint
        - /backend:route
        - /backend:middleware
      nx_targets:
