  api-implementation-specialist:
    enabled: true
    priority: high
    parent_agent: backend-expert
    model: claude-haiku-4-5
    context_limit: 3500
    timeout: 300000
    cache_enabled: true
    cache_ttl: 300

    delegation_triggers:
