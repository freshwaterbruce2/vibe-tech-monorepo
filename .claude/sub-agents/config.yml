      failure: "Build failed - ${error_message}"
    desktop-integration-specialist:
      success: "IPC validated - ${channels_checked} channels secure"
      failure: "IPC issues found - ${security_violations}"
    # Web
    vite-build-specialist:
      success: "Build completed - ${bundle_size} total"
      failure: "Build failed - ${error_message}"
    react-component-specialist:
