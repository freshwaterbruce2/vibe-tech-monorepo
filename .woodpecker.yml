# DEPRECATED: Woodpecker CI configuration (migrated to GitHub Actions)
# See: .github/workflows/ci.yml for active CI pipeline
# Kept for reference only - do not use

variables:
  - &node_image "node:22"
  - &pnpm_version "10.28.2"

pipeline:
  # ============================================
  # QUALITY GATES (Run on all branches)
  # ============================================
  install:
    image: *node_image
    commands:
      - corepack enable
      - corepack prepare pnpm@10.28.2 --activate
      - pnpm install --frozen-lockfile

  sync-audit:
    image: *node_image
    depends_on: [install]
    commands:
      - pnpm run ci:sync

  lint:
    image: *node_image
    depends_on: [install, sync-audit]
    commands:
      - git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main || true
      - pnpm run ci:lint || pnpm run ci:lint:all

  typecheck:
    image: *node_image
    depends_on: [install, sync-audit]
    commands:
      - git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main || true
      - pnpm run ci:typecheck || pnpm run ci:typecheck:all

  # Non-blocking debt lane for quarantined projects
  typecheck-quarantine:
    image: *node_image
    depends_on: [install]
    commands:
      - pnpm run typecheck:quarantine || echo "Quarantine typecheck has known failures"
    when:
      branch: [main, develop]

  test:
    image: *node_image
    depends_on: [install, sync-audit]
    commands:
      - git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main || true
      - pnpm run ci:test || pnpm run ci:test:all
    when:
      branch: [main, develop, feature/*]

  build:
    image: *node_image
    depends_on: [install, sync-audit]
    commands:
      - git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main || true
      - pnpm run ci:build || pnpm run ci:build:all
    when:
      branch: [main, develop]

  # ============================================
  # CHANGESET STATUS CHECK (PRs only)
  # ============================================
  invoice-automation-saas-pr-checks:
    image: *node_image
    depends_on: [install, sync-audit]
    commands:
      - git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main || true
      - pnpm nx run invoice-automation-saas:typecheck
      - pnpm nx run invoice-automation-saas:build
      - pnpm nx run invoice-automation-saas:lint || echo "invoice-automation-saas lint warnings; non-blocking"
      - pnpm nx run invoice-automation-saas:test -- --run || echo "invoice-automation-saas tests failed; non-blocking"
    when:
      event: pull_request

  changeset-check:
    image: *node_image
    depends_on: [install]
    commands:
      - echo "Checking for changesets..."
      - pnpm changeset status --verbose || echo "No changesets found"
    when:
      event: pull_request

  # ============================================
  # RELEASE AUTOMATION (main branch only)
  # ============================================
  changeset-version:
    image: *node_image
    depends_on: [build, test]
    commands:
      - |
        # Count changesets (excluding config and readme)
        CHANGESET_COUNT=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
        echo "Found $CHANGESET_COUNT changesets"

        if [ "$CHANGESET_COUNT" -gt 0 ]; then
          echo "Bumping versions..."
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          pnpm changeset version

          # Commit version changes
          git add .
          git commit -m "chore(release): version packages [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Push skipped (may need token)"
        else
          echo "No changesets to process"
        fi
    when:
      event: push
      branch: main

  changeset-publish:
    image: *node_image
    depends_on: [changeset-version]
    commands:
      - |
        if [ -n "$NPM_TOKEN" ]; then
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          pnpm changeset publish
          git push origin --tags || echo "Tag push completed"
        else
          echo "NPM_TOKEN not set - skipping publish"
          echo "Set NPM_TOKEN secret in GitHub to enable publishing"
        fi
    secrets: [npm_token]
    when:
      event: push
      branch: main

  # ============================================
  # SELF-HEALING SYSTEM (Runs on failure)
  # ============================================
  self-heal:
    image: *node_image
    depends_on: [lint, typecheck, test]
    commands:
      - |
        if [ "${CI_COMMIT_MESSAGE}" == *"auto-fix"* ]; then
          echo "Already an auto-fix commit. Skipping to prevent loop."
          exit 0
        fi

        echo "Quality check failed. Analyzing for auto-fixes..."
        
        # Setup git for potential commits
        git config --global user.email "bot@vibetech.ai"
        git config --global user.name "Self-Healing Bot"

        # 1. Validate Safety
        # In Woodpecker, changed files can be identified via git diff against origin/main
        git fetch origin main
        git diff --name-only origin/main > changed_files.txt
        
        node scripts/validate-auto-fix-safety.mjs changed_files.txt
        if [ $? -ne 0 ]; then
          echo "SAFETY CHECK FAILED: Unsafe files detected. Aborting auto-fix."
          exit 1
        fi
        
        echo "Safety check passed. Attempting fixes..."
        
        # 2. Apply fixes
        corepack enable
        corepack prepare pnpm@10.28.2 --activate
        
        pnpm run lint:fix:all || echo "Lint fix partially applied"
        
        # 3. Check for changes and commit
        if [ -n "$(git status --porcelain)" ]; then
          echo "Changes detected. Committing fixes..."
          git add .
          git commit -m "chore: auto-fix by self-healing system [skip ci]"
          git push origin ${CI_COMMIT_BRANCH}
          echo "✅ Self-healing fixes applied and pushed."
        else
          echo "No automated fixes could be applied."
        fi
    when:
      status: failure
      branch: [main, develop]

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify-success:
    image: *node_image
    commands:
      - echo "✅ Pipeline completed successfully!"
      - echo "Branch: ${CI_COMMIT_BRANCH}"
      - echo "Commit: ${CI_COMMIT_SHA:0:8}"
    when:
      status: success
      branch: main

  notify-failure:
    image: *node_image
    commands:
      - echo "❌ Pipeline failed!"
      - echo "Check logs for details"
    when:
      status: failure
