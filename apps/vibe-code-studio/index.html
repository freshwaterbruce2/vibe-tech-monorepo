<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/deepcode-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Code Studio - Next-Generation AI-Powered Development Experience</title>
  <meta name="description"
    content="Vibe Code Studio is a next-generation AI-powered code editor designed for modern development workflows." />

  <!-- CSP is managed by Tauri in production (tauri.conf.json) -->
  <!-- Only apply HTML CSP in web-only mode (dev server) -->
  <style>
    body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif;background:#1e1e1e;color:#d4d4d4;overflow:hidden}
    #root{height:100vh;width:100vw}
    .loading-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
    .loading-logo{font-size:3rem;font-weight:700;margin-bottom:1rem;background:linear-gradient(45deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .loading-text{font-size:1.2rem;opacity:.8;margin-bottom:2rem}
    .loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#00d2ff;animation:spin 1s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-logo">⚡ Vibe Code Studio</div>
      <div class="loading-text">Where innovation meets elegant design</div>
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script>
    window.__BOOT_ERRORS__=[];
    function showBootError(msg){
      window.__BOOT_ERRORS__.push(msg);
      var el=document.querySelector('.loading-text');
      if(el){el.style.color='#ff6b6b';el.style.opacity='1';el.textContent='Startup Error: '+msg.split('\n')[0];}
      var spinner=document.querySelector('.loading-spinner');
      if(spinner)spinner.style.display='none';
      var ls=document.querySelector('.loading-screen');
      if(ls&&!document.getElementById('boot-error-details')){
        var pre=document.createElement('pre');
        pre.id='boot-error-details';
        pre.style.cssText='color:#ff6b6b;font-size:0.75rem;max-width:80vw;max-height:40vh;overflow:auto;margin:1rem auto;text-align:left;padding:1rem;background:rgba(0,0,0,0.3);border-radius:8px;white-space:pre-wrap;word-break:break-all;';
        pre.textContent=window.__BOOT_ERRORS__.join('\n\n');
        ls.appendChild(pre);
      }
    }
    window.onerror=function(msg,src,line,col,err){
      showBootError(msg+(src?' at '+src+':'+line+':'+col:'')+(err&&err.stack?'\n'+err.stack:''));
    };
    window.addEventListener('unhandledrejection',function(e){
      showBootError('Unhandled rejection: '+(e.reason&&e.reason.stack||e.reason||'unknown'));
    });
    setTimeout(function(){
      if(!window.__APP_MOUNTED__){
        showBootError('App failed to mount within 15s. The JavaScript bundle may have failed to load.');
      }
    },15000);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
