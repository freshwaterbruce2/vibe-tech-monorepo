[pytest]
testpaths = vibe_justice/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers to avoid typos
# Coverage floor pinned to actual measured baseline (~33%). Raising the floor
# must land WITH new tests that actually cover the gap, otherwise
# --cov-fail-under fails the suite even when every individual test passes.
# Target: 60 (interim) / 80 (monorepo default) once legacy modules are covered.
addopts =
    -v
    --strict-markers
    --tb=short
    -ra
    --cov=vibe_justice
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=55

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use database/filesystem)
    slow: Slow tests (may take >5 seconds)
    security: Security-related tests
    api: API endpoint tests

# Async configuration
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0

# Test discovery
norecursedirs =
    .git
    .venv
    __pycache__
    dist
    build
    *.egg-info

# Coverage configuration
[coverage:run]
source = vibe_justice
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.venv/*
    */migrations/*

[coverage:report]
precision = 2
skip_empty = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
