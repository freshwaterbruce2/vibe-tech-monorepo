<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy is delivered via Cloud Run response headers; -->
    <!-- see CSP_DIRECTIVES in apps/vibe-tutor/render-backend/server.mjs for the policy source. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Cache busting for Capacitor native apps -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="version" content="1.5.9" />
    <title>Vibe Tutor</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta name="color-scheme" content="dark light" />
    <!-- Optional Windows tiles fallback -->
    <meta name="msapplication-TileColor" content="#06131F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Load environment configuration before app loads -->
    <script src="/env-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
