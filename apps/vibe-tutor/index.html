<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-eval' 'unsafe-inline' http://localhost:5173; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; media-src 'self' blob: data: https: http:; connect-src 'self' https: http: ws: wss: http://localhost:3001 http://localhost:5173 ws://localhost:5173 ws://localhost:3001"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Cache busting for Capacitor native apps -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="version" content="1.5.8" />
    <title>Vibe Tutor</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta name="color-scheme" content="dark light" />
    <!-- Optional Windows tiles fallback -->
    <meta name="msapplication-TileColor" content="#06131F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Vibe Tutor neon palette */
        --background-main: #06131f;
        --background-card: #0d1e2f;
        --background-surface: #14304a;
        --background: var(--background-main);
        --glass-surface: rgba(34, 211, 238, 0.12);
        --glass-border: rgba(34, 211, 238, 0.26);

        /* Primary accents */
        --primary-accent: #22d3ee; /* Neon cyan */
        --secondary-accent: #7cff8b; /* Neon lime */
        --tertiary-accent: #ff5fd2; /* Hot pink */
        --quaternary-accent: #fbbf24; /* Solar amber */

        /* Text Colors */
        --text-primary: #f8fafc;
        --text-secondary: #cbd5e1;
        --text-muted: #64748b;
        --text-glow: #ffffff;

        /* Border & Effects */
        --border-color: rgba(34, 211, 238, 0.22);
        --border-hover: rgba(124, 255, 139, 0.45);
        --shadow-glow: 0 16px 42px rgba(6, 19, 31, 0.42);

        /* Gradients */
        --gradient-primary: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        --gradient-surface: linear-gradient(
          135deg,
          rgba(34, 211, 238, 0.14),
          rgba(255, 95, 210, 0.08)
        );
        --gradient-glow: linear-gradient(135deg, var(--primary-accent), var(--tertiary-accent));

        /* Neon effects */
        --neon-glow-primary:
          0 0 10px var(--primary-accent), 0 0 20px var(--primary-accent),
          0 0 40px var(--primary-accent), 0 0 60px var(--primary-accent);
        --neon-glow-secondary:
          0 0 10px var(--secondary-accent), 0 0 20px var(--secondary-accent),
          0 0 40px var(--secondary-accent);
        --neon-glow-accent:
          0 0 10px var(--tertiary-accent), 0 0 20px var(--tertiary-accent),
          0 0 36px rgba(255, 95, 210, 0.55);
        --neon-glow-soft:
          0 0 18px rgba(34, 211, 238, 0.32), 0 0 34px rgba(255, 95, 210, 0.18);

        /* Animation Timings */
        --transition-fast: 0.15s ease-out;
        --transition-normal: 0.3s ease-out;
        --transition-slow: 0.5s ease-out;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--background-main);
        color: var(--text-primary);
        background-image:
          radial-gradient(circle at 18% 18%, rgba(34, 211, 238, 0.24) 0%, transparent 46%),
          radial-gradient(circle at 82% 24%, rgba(124, 255, 139, 0.18) 0%, transparent 42%),
          radial-gradient(circle at 62% 78%, rgba(255, 95, 210, 0.18) 0%, transparent 44%),
          linear-gradient(180deg, rgba(6, 19, 31, 0.84) 0%, rgba(6, 19, 31, 1) 100%);
        background-size:
          100% 100%,
          100% 100%,
          100% 100%,
          100% 100%;
        background-attachment: fixed;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Glassmorphism Classes */
      .glass-card {
        background: var(--glass-surface);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: var(--shadow-glow);
        transition: all var(--transition-normal);
      }

      .glass-card:hover {
        background: rgba(34, 211, 238, 0.16);
        border-color: var(--border-hover);
        box-shadow: var(--neon-glow-soft);
        transform: translateY(-2px) scale(1.01);
      }

      .glass-button {
        background: var(--gradient-primary);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        transition: all var(--transition-fast);
        position: relative;
        overflow: hidden;
      }

      .glass-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left var(--transition-slow);
      }

      .glass-button:hover::before {
        left: 100%;
      }

      .glass-button:hover {
        box-shadow: var(--neon-glow-primary);
        transform: translateY(-1px);
      }

      /* Neon Text Effects */
      .neon-text-primary {
        color: var(--text-glow);
        text-shadow: var(--neon-glow-primary);
        transition: all var(--transition-normal);
      }

      .neon-text-secondary {
        color: var(--text-glow);
        text-shadow: var(--neon-glow-secondary);
        transition: all var(--transition-normal);
      }

      .glow-on-hover:hover {
        text-shadow: var(--neon-glow-soft);
        color: var(--text-glow);
      }

      /* Animation Classes */
      .pulse-glow {
        animation: pulseGlow 2s ease-in-out infinite alternate;
      }

      @keyframes pulseGlow {
        from {
          box-shadow: var(--shadow-glow);
        }
        to {
          box-shadow: var(--neon-glow-primary);
        }
      }

      .float-animation {
        animation: float 3s ease-in-out infinite;
      }

      /* Word Hunt Animations */
      .animate-pulse-once {
        animation: pulseOnce 0.6s ease-out;
      }

      @keyframes pulseOnce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      @keyframes confetti-fall {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) translateY(0) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) translateY(300px) rotate(720deg);
        }
      }

      .animate-confetti {
        will-change: transform, opacity;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Icon Animations - Gen Z 2025 */
      .icon-pulse {
        animation: iconPulse 2s ease-in-out infinite;
      }

      @keyframes iconPulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 8px var(--primary-accent));
        }
        50% {
          transform: scale(1.1);
          filter: drop-shadow(0 0 16px var(--primary-accent));
        }
      }

      .icon-bounce {
        animation: iconBounce 1s ease-in-out infinite;
      }

      @keyframes iconBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .icon-spin {
        animation: iconSpin 3s linear infinite;
      }

      @keyframes iconSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Enhanced Button Interactions */
      .glass-button:active {
        transform: scale(0.95);
      }

      /* Improved Focus States */
      .focus-glow:focus-visible {
        outline: none;
        box-shadow: var(--neon-glow-primary);
        border-color: var(--primary-accent);
      }

      /* Enhanced Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(15, 15, 35, 0.8);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gradient-primary);
        border-radius: 10px;
        border: 2px solid rgba(15, 15, 35, 0.8);
        box-shadow: var(--shadow-glow);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--gradient-glow);
        box-shadow: var(--neon-glow-soft);
      }

      /* Safe Area Insets for Notched Phones */
      :root {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* Touch Device Optimizations */
      * {
        -webkit-tap-highlight-color: rgba(34, 211, 238, 0.24);
        touch-action: manipulation;
      }

      button,
      a {
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      /* Touch scrolling is natively smooth in all modern browsers */

      body {
        overscroll-behavior-y: contain;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load environment configuration before app loads -->
    <script src="/env-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // FIXED: Disable service worker for Capacitor (native app builds)
      // Only enable for PWA (web browser)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Check if running in Capacitor native app
          if (
            globalThis.location.protocol !== 'capacitor:' &&
            globalThis.location.protocol !== 'ionic:'
          ) {
            navigator.serviceWorker.register('/service-worker.js?v=6').then(
              (registration) => {
                console.log('[PWA] Service Worker registered successfully');
              },
              (err) => {
                console.log('[PWA] ServiceWorker registration failed: ', err);
              },
            );
          } else {
            console.log('[Capacitor] Service worker disabled for native app - no caching');
          }
        });
      }
    </script>
  </body>
</html>
