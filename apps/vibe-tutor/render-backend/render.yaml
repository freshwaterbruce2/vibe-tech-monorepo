services:
  - type: web
    name: vibe-tutor-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # $7/mo, always-on (no cold starts)
    region: ohio # US East — close to user
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: MOONSHOT_API_KEY
        sync: false # Kimi AI — primary fallback (api.moonshot.cn)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
