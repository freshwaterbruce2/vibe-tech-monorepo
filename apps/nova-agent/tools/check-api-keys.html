<!DOCTYPE html>
<html>
<head>
    <title>Check Nova Agent API Keys</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .status-card {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .key-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            border-radius: 4px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-set {
            background: #22c55e;
        }
        .status-missing {
            background: #ef4444;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #7c3aed;
        }
        .error {
            color: #ef4444;
            padding: 10px;
            background: #2a1a1a;
            border-radius: 4px;
            margin: 10px 0;
        }
        .info {
            color: #60a5fa;
            padding: 10px;
            background: #1a2a3a;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🔑 Nova Agent API Key Status</h1>
    
    <div class="status-card">
        <h2>Credential Manager Status</h2>
        <div id="status-container">
            <p>Click "Check Keys" to verify stored API keys...</p>
        </div>
        <button onclick="checkKeys()">Check Keys</button>
    </div>

    <div class="info">
        <strong>Note:</strong> This checks Windows Credential Manager for stored API keys.
        Keys are stored securely and encrypted by Windows.
    </div>

    <script type="module">
        import { invoke } from 'https://unpkg.com/@tauri-apps/api@2/core';

        
        window.checkKeys = async () => {
            const container = document.getElementById('status-container');
            container.innerHTML = '<p>Checking...</p>';
            
            try {
                const status = await invoke('get_api_key_status');
                
                container.innerHTML = `
                    <div class="key-status">
                        <span>
                            <span class="status-indicator ${status.openrouter_key_set ? 'status-set' : 'status-missing'}"></span>
                            OpenRouter API Key
                        </span>
                        <strong>${status.openrouter_key_set ? '✅ SET' : '❌ MISSING'}</strong>
                    </div>
                    <div class="key-status">
                        <span>
                            <span class="status-indicator ${status.deepseek_key_set ? 'status-set' : 'status-missing'}"></span>
                            DeepSeek API Key
                        </span>
                        <strong>${status.deepseek_key_set ? '✅ SET' : '❌ MISSING'}</strong>
                    </div>
                    <div class="key-status">
                        <span>
                            <span class="status-indicator ${status.groq_key_set ? 'status-set' : 'status-missing'}"></span>
                            Groq API Key
                        </span>
                        <strong>${status.groq_key_set ? '✅ SET' : '❌ MISSING'}</strong>
                    </div>
                    <div class="key-status">
                        <span>
                            <span class="status-indicator ${status.google_key_set ? 'status-set' : 'status-missing'}"></span>
                            Google API Key
                        </span>
                        <strong>${status.google_key_set ? '✅ SET' : '❌ MISSING'}</strong>
                    </div>
                `;
                
                // Show recommendation
                if (!status.openrouter_key_set) {
                    container.innerHTML += `
                        <div class="error" style="margin-top: 15px;">
                            <strong>⚠️ OpenRouter API Key Missing</strong><br>
                            Chat will not work without this key. Please add it in Settings.
                        </div>
                    `;
                } else {
                    container.innerHTML += `
                        <div class="info" style="margin-top: 15px; background: #1a3a1a; color: #22c55e;">
                            <strong>✅ Ready to Chat!</strong><br>
                            OpenRouter API key is configured. Chat should work.
                        </div>
                    `;
                }
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error}
                    </div>
                    <p>Make sure Nova Agent is running with Tauri backend.</p>
                `;
            }
        };
    </script>
</body>
</html>
