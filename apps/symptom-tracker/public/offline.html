<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        margin: 32px auto;
        padding: 18px 16px;
        border: 1px solid rgba(128, 128, 128, 0.35);
        border-radius: 14px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      p {
        margin: 0;
        opacity: 0.8;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Symptom Tracker is offline</h1>
      <p>
        This app needs your home computer/server running to load and save entries. Reconnect to Wi‑Fi
        and try again.
      </p>
    </div>
  </body>
</html>
