# Vibe-Justice CI
# Frontend (TypeScript/React + Tauri) and backend (Python/FastAPI) quality gates.
# Path-filtered: runs only when vibe-justice source or this workflow change.

name: vibe-justice CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/vibe-justice/**'
      - '.github/workflows/vibe-justice.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/vibe-justice/**'
      - '.github/workflows/vibe-justice.yml'

permissions:
  contents: read

concurrency:
  group: vibe-justice-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  PYTHON_VERSION: '3.13'

jobs:
  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter vibe-justice-frontend...

      - name: Lint
        run: pnpm nx run vibe-justice:lint

      - name: Typecheck
        run: pnpm nx run vibe-justice:typecheck

      - name: Unit tests (Vitest)
        run: pnpm nx run vibe-justice:test:frontend

      - name: Build
        run: pnpm nx run vibe-justice:build:frontend

  backend:
    name: Backend (pytest + coverage)
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/vibe-justice/backend
    env:
      DATABASE_PATH: ':memory:'
      VIBE_JUSTICE_ENV: test
      VIBE_JUSTICE_ALLOWED_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/vibe-justice/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest vibe_justice/tests -v --tb=short

      - name: Upload coverage report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vibe-justice-backend-coverage
          path: apps/vibe-justice/backend/htmlcov/
          retention-days: 7
