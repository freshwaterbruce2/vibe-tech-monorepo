# Manual release prep: bump gravity-claw versions (package.json, tauri.conf.json, Cargo.toml).
# Commit and tag the result in a follow-up step or separate PR as your process requires.

name: Release (gravity-claw bump)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g. 0.3.0 or v0.3.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-gravity-claw-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  bump:
    name: Verify install and bump versions
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        shell: pwsh
        env:
          BUMP_VERSION: ${{ inputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:GITHUB_WORKSPACE/scripts/bump-app-version.ps1" -App 'gravity-claw' -Version $env:BUMP_VERSION
