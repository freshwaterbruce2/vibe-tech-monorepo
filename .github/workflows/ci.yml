# GitHub Actions CI for pnpm monorepo
# Converted from .woodpecker.yml on 2026-03-09
# Nx-affected quality gates + monorepo sync audit
# Security: Actions pinned to commit SHAs, least-privilege permissions

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '*.txt'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '*.txt'

# Least-privilege: default to read-only for all jobs
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  # ============================================
  # DEPENDENCY REVIEW (PRs only)
  # ============================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Review dependency changes
        uses: actions/dependency-review-action@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

  # ============================================
  # QUALITY GATES (Run on all branches)
  # ============================================
  quality:
    name: Quality Gates
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Nx cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Start Nx Cloud CI run
        continue-on-error: true
        run: >
          pnpm exec nx start-ci-run
          --distribute-on=manual
          --stop-agents-after=lint,typecheck,test,build
          --fix-tasks=lint,typecheck,test,build
          --auto-apply-fixes=lint

      - name: Sync audit
        run: pnpm run ci:sync

      - name: Lint (affected)
        run: pnpm run ci:lint

      - name: Typecheck (affected)
        run: pnpm run ci:typecheck

      - name: Test (affected)
        run: pnpm run ci:test

      - name: Run Nx Cloud self-healing
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        run: pnpm exec nx fix-ci

  # ============================================
  # BUILD (main and develop only)
  # ============================================
  build:
    name: Build
    runs-on: windows-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (affected)
        run: pnpm run ci:build

  # ============================================
  # CHANGESET STATUS CHECK (PRs only)
  # ============================================
  changeset-check:
    name: Changeset Check
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure local main branch exists
        # PR checkout leaves HEAD detached on the merge commit; `origin/main`
        # is fetched but no local `main` branch is created. `@changesets/git`
        # runs `git merge-base main HEAD`, which needs a local ref.
        run: git branch -f main origin/main

      - name: Check changesets
        # pnpm changeset status exits 1 when there are no changesets in the PR
        # (a normal and allowed condition for changes that don't require a
        # release note). pwsh's `$cmd || echo "..."` does NOT reset
        # $LASTEXITCODE, so the previous form always failed the step.
        # Explicitly swallow the exit-1 "no changesets" case here; any other
        # exit code (config error, divergence failure, etc.) still propagates.
        shell: pwsh
        run: |
          pnpm changeset status --verbose
          if ($LASTEXITCODE -eq 1) {
            Write-Host "No changesets found (allowed for non-release-worthy changes)."
            exit 0
          }
          exit $LASTEXITCODE

  # ============================================
  # RELEASE AUTOMATION (main branch only)
  # ============================================
  release:
    name: Release
    runs-on: windows-latest
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages
        run: |
          $changesets = Get-ChildItem .changeset -Filter "*.md" | Where-Object { $_.Name -ne "README.md" }
          if ($changesets.Count -gt 0) {
            Write-Host "Found $($changesets.Count) changesets. Bumping versions..."
            git config user.email "ci@github.com"
            git config user.name "GitHub Actions"
            pnpm changeset version
            git add .
            git commit -m "chore(release): version packages [skip ci]" 2>$null
            git push origin main 2>$null
          } else {
            Write-Host "No changesets to process"
          }

      - name: Publish packages
        if: env.NPM_TOKEN != ''
        run: |
          "//registry.npmjs.org/:_authToken=$env:NPM_TOKEN" | Out-File ~/.npmrc
          pnpm changeset publish
          git push origin --tags 2>$null

  # ============================================
  # COVERAGE (non-blocking while coverage targets are being completed)
  # ============================================
  coverage:
    name: Coverage (affected, non-blocking)
    runs-on: windows-latest
    needs: quality
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage (affected)
        run: pnpm run ci:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: affected-coverage
          path: |
            coverage/**
            apps/**/coverage/**
            packages/**/coverage/**
          if-no-files-found: ignore
          retention-days: 7

  # ============================================
  # NODE 24 COMPATIBILITY (non-blocking canary)
  # ============================================
  node24-canary:
    name: Node 24 Compatibility (non-blocking)
    runs-on: windows-latest
    needs: quality
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    env:
      NODE_VERSION: '24'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (affected)
        run: pnpm run ci:typecheck

      - name: Build (affected)
        run: pnpm run ci:build

  # ============================================
  # E2E TESTS (main, develop, and PRs)
  # ============================================
  e2e:
    name: E2E Tests (Chromium)
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 30
    # The legacy business-booking-platform Playwright suite is currently
    # deterministic-red and expensive on Windows. Keep it available for manual
    # triage, but do not run it on every push while the BBP-next migration lands.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests
        run: pnpm run ci:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: coverage/apps/business-booking-platform-next/
          retention-days: 7
