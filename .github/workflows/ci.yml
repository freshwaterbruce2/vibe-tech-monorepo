# GitHub Actions CI for pnpm monorepo
# Converted from .woodpecker.yml on 2026-03-09
# Nx-affected quality gates + monorepo sync audit
# Security: Actions pinned to commit SHAs, least-privilege permissions

name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '*.txt'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '*.txt'

# Least-privilege: default to read-only for all jobs
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  # ============================================
  # QUALITY GATES (Run on all branches)
  # ============================================
  quality:
    name: Quality Gates
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Sync audit
        run: pnpm run ci:sync

      - name: Lint (affected)
        run: pnpm run ci:lint

      - name: Typecheck (affected)
        run: pnpm run ci:typecheck

      - name: Test (affected)
        run: pnpm run ci:test

  # ============================================
  # BUILD (main and develop only)
  # ============================================
  build:
    name: Build
    runs-on: windows-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (affected)
        run: pnpm run ci:build

  # ============================================
  # CHANGESET STATUS CHECK (PRs only)
  # ============================================
  changeset-check:
    name: Changeset Check
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changesets
        run: pnpm changeset status --verbose || echo "No changesets found"

  # ============================================
  # RELEASE AUTOMATION (main branch only)
  # ============================================
  release:
    name: Release
    runs-on: windows-latest
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages
        run: |
          $changesets = Get-ChildItem .changeset -Filter "*.md" | Where-Object { $_.Name -ne "README.md" }
          if ($changesets.Count -gt 0) {
            Write-Host "Found $($changesets.Count) changesets. Bumping versions..."
            git config user.email "ci@github.com"
            git config user.name "GitHub Actions"
            pnpm changeset version
            git add .
            git commit -m "chore(release): version packages [skip ci]" 2>$null
            git push origin main 2>$null
          } else {
            Write-Host "No changesets to process"
          }

      - name: Publish packages
        if: env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          "//registry.npmjs.org/:_authToken=$env:NPM_TOKEN" | Out-File ~/.npmrc
          pnpm changeset publish
          git push origin --tags 2>$null

  # ============================================
  # SELF-HEALING (on quality failure)
  # ============================================
  self-heal:
    name: Self-Healing
    runs-on: windows-latest
    needs: quality
    if: failure() && github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if auto-fix commit
        id: check
        run: |
          $msg = git log -1 --pretty=%B
          if ($msg -match "auto-fix") {
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Apply lint fixes
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "Self-Healing Bot"
          git config user.email "bot@vibetech.ai"

          git diff --name-only origin/main | Out-File changed_files.txt
          node scripts/validate-auto-fix-safety.mjs changed_files.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "SAFETY CHECK FAILED: Aborting auto-fix."
            exit 1
          }

          pnpm run lint:fix:all 2>$null

          $status = git status --porcelain
          if ($status) {
            git add .
            git commit -m "chore: auto-fix by self-healing system [skip ci]"
            git push origin ${{ github.ref_name }}
            Write-Host "Self-healing fixes applied and pushed."
          } else {
            Write-Host "No automated fixes could be applied."
          }
