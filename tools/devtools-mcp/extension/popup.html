<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTools MCP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      min-height: 160px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    header svg { width: 20px; height: 20px; flex-shrink: 0; }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.01em; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #1e293b;
      margin-bottom: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.red   { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .dot.gray  { background: #64748b; }
    .status-label { font-weight: 500; }
    .info-block {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .info-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-key { color: #94a3b8; flex-shrink: 0; width: 48px; }
    .info-val { color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 175px; }
    .footer {
      color: #475569;
      font-size: 11px;
      text-align: center;
      margin-top: 4px;
    }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
    <h1>DevTools MCP</h1>
  </header>

  <div class="status-row">
    <div class="dot gray" id="dot"></div>
    <span class="status-label" id="status-label">Checking...</span>
  </div>

  <div class="info-block">
    <div class="info-row">
      <span class="info-key">Server</span>
      <span class="info-val" id="ws-url">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Tab</span>
      <span class="info-val" id="tab-url">—</span>
    </div>
  </div>

  <p class="footer">
    <a href="https://github.com/YOUR_USER/devtools-mcp" target="_blank">docs &amp; setup guide</a>
  </p>

  <script src="popup.js"></script>
</body>
</html>
