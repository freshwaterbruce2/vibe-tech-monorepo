# Forgejo Actions CI for pnpm monorepo (Codeberg)
# Mirrors .github/workflows/ci.yml for Codeberg hosting
# Forgejo Actions uses GitHub Actions-compatible syntax
# Note: uses ubuntu-latest (Codeberg has no Windows runners);
#       quality/build steps are platform-agnostic so this is fine.

name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync audit
        run: pnpm run ci:sync

      - name: Lint (affected)
        run: pnpm run ci:lint || pnpm run ci:lint:all

      - name: Typecheck (affected)
        run: pnpm run ci:typecheck || pnpm run ci:typecheck:all

      - name: Test (affected)
        run: pnpm run ci:test || pnpm run ci:test:all

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (affected)
        run: pnpm run ci:build || pnpm run ci:build:all
